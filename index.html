:root{
  --void:#06070f; --deep:#0a0d1f; --surface:#0d1128; --raised:#151a38; --border:#242a52;
  --gold:#4de8ff; --gold-dim:#2a7a94; --gold-glow:rgba(77,232,255,.14); --gold-strong:rgba(77,232,255,.28);
  --gold-light:#a8f2ff; --gold-deep:#1f6478; --gold-border:rgba(77,232,255,.28);
  --gold-gradient:linear-gradient(135deg,#4de8ff 0%,#a855f7 55%,#ff4fd8 100%);
  --ice:#b8a8ff; --ice-dim:#6a5a9e; --mint:#3ce8b8; --coral:#ff5470; --violet:#a855f7; --violet-dim:#6d3fa0;
  --text:#eef1ff; --dim:#838ab8; --faint:#383e63;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --void:#F5F6FB; --deep:#FFFFFF; --surface:#FFFFFF; --raised:#EEF0FA; --border:#DCE0F0;
  --gold:#0891b2; --gold-dim:#4de8ff; --gold-glow:rgba(8,145,178,.10); --gold-strong:rgba(8,145,178,.2);
  --gold-light:#0e7490; --gold-deep:#155e75; --gold-border:rgba(8,145,178,.22);
  --gold-gradient:linear-gradient(135deg,#0891b2 0%,#7c3aed 55%,#db2777 100%);
  --ice:#7c3aed; --ice-dim:#c4b5fd; --mint:#0d9488; --coral:#e11d48; --violet:#7c3aed; --violet-dim:#c4b5fd;
  --text:#161a2e; --dim:#5f6690; --faint:#c3c8e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:'Cairo',sans-serif}
body{
  background-image:
    radial-gradient(ellipse 600px 500px at 15% -8%, var(--gold-glow), transparent 60%),
    radial-gradient(ellipse 500px 400px at 100% 10%, rgba(168,85,247,.07), transparent 55%),
    radial-gradient(ellipse 700px 600px at 50% 115%, rgba(60,232,184,.06), transparent 60%);
  background-attachment:fixed;
  background-repeat:no-repeat;
  background-size:130% 130%;
  animation:ambientDrift 26s ease-in-out infinite;
}
@keyframes ambientDrift{
  0%,100%{background-position:0% 0%, 0% 0%, 0% 0%;}
  50%{background-position:4% 3%, -3% 4%, 2% -3%;}
}
@media (prefers-reduced-motion: reduce){ body{animation:none;} }
.const-star-today{animation:constPulse 2.4s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
@keyframes constPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.5);}
}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

.topbar{padding:calc(var(--safe-top) + 14px) 18px 13px;
  background:linear-gradient(180deg, color-mix(in srgb, var(--deep) 93%, transparent), color-mix(in srgb, var(--deep) 82%, transparent));
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:5;gap:12px;
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 12px 28px -22px rgba(0,0,0,.7);}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim) 15%,var(--violet) 45%,var(--coral) 70%,transparent 95%);
  background-size:220% 100%;opacity:.45;animation:topbarShimmer 9s linear infinite;}
@keyframes topbarShimmer{0%{background-position:0% 0%}100%{background-position:-220% 0%}}
@media (prefers-reduced-motion: reduce){.topbar::after{animation:none}}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.back-btn{width:30px;height:30px;border-radius:10px;background:var(--raised);border:1px solid var(--border);color:var(--dim);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;transition:background .15s,color .15s,transform .15s;}
.back-btn:active{background:var(--raised);color:var(--text);transform:scale(.92)}
.brand-orb{position:relative;width:34px;height:34px;flex-shrink:0}
.brand-orb::before{content:'';position:absolute;inset:-7px;border-radius:50%;
  background:conic-gradient(from 0deg, var(--gold), var(--violet), var(--coral), var(--mint), var(--gold));
  filter:blur(9px);opacity:.5;animation:orbSpin 7s linear infinite;}
@media (prefers-reduced-motion: reduce){.brand-orb::before{animation:none}}
.brand-orb-core{position:relative;width:34px;height:34px;border-radius:11px;
  background:linear-gradient(150deg,var(--raised),var(--deep) 70%);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  font-family:'Space Mono',monospace;font-weight:700;font-size:10.5px;letter-spacing:-.5px;color:var(--gold);
  box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 4px 14px -6px rgba(0,0,0,.7);}
.brand-orb-core::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent);pointer-events:none;}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(var(--safe-bottom) + 90px)}

.bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  padding:8px 6px calc(var(--safe-bottom) + 8px);background:color-mix(in srgb, var(--deep) 82%, transparent);border-top:1px solid var(--border);display:flex;gap:4px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:fixed;}

.fab-export{position:fixed;left:16px;bottom:calc(var(--safe-bottom) + 78px);width:46px;height:46px;border-radius:50%;

  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;

  box-shadow:0 4px 14px -6px rgba(0,0,0,.35);transition:transform .15s ease;}
.fab-export:active{transform:scale(.92)}
.fab-export.needs-attention{border-color:transparent;background:
    linear-gradient(var(--surface),var(--surface)) padding-box,
    var(--gold-gradient) border-box;
  border:2px solid transparent;animation:fabPulse 2.2s ease-in-out infinite;}

.cal-nav:active{transform:scale(.85);background:var(--gold-glow);border-color:var(--gold-dim)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:2px;column-gap:4px;position:relative}
.cal-day-label{text-align:center;font-size:9px;color:var(--faint);font-family:'Space Mono',monospace;padding-bottom:8px;font-weight:700;letter-spacing:0}
.cal-cell{position:relative;aspect-ratio:1;border-radius:12px;background:var(--raised);border:1px solid var(--border);display:flex;
  align-items:center;justify-content:center;font-size:12px;color:var(--dim);font-family:'Space Mono',monospace;cursor:pointer;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease; overflow:hidden;}
.cal-cell::after{content:'';position:absolute;inset:0;border-radius:12px;background:linear-gradient(155deg,rgba(255,255,255,.08),transparent 55%);
  opacity:0;transition:opacity .15s;pointer-events:none;}
.cal-cell:active{transform:scale(.86)}
.cal-cell:active::after{opacity:1}
.cal-cell.has-score::after{opacity:.6}
.cal-cell.today{box-shadow:0 0 0 1.75px var(--gold) inset, 0 0 12px -2px var(--gold-strong);font-weight:900}
.cal-cell.today::before{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--gold)}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.empty::after{display:none}
.cal-legend{display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;font-size:10px;color:var(--dim);margin-top:14px;
  padding-top:12px;border-top:1px solid var(--border)}
.cal-legend-item{display:flex;align-items:center;gap:4px}
.cal-swatch{width:9px;height:9px;border-radius:3px;display:inline-block;border:1px solid var(--border)}
.cal-swipe{touch-action:pan-y}

.pillar-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.pillar-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.pillar-icon{font-size:26px;margin-bottom:6px}
.pillar-name{font-size:12.5px;font-weight:700;margin-bottom:6px}
.pillar-goal{font-size:10.5px;color:var(--dim);line-height:1.6}
.pt-gold{border-top:3px solid var(--gold)} .pt-ice{border-top:3px solid var(--ice)}
.pt-mint{border-top:3px solid var(--mint)} .pt-coral{border-top:3px solid var(--coral)} .pt-violet{border-top:3px solid var(--violet)}
.phase{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:10px}
.phase-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.phase-title{font-size:13.5px;font-weight:700}
.phase-body{font-size:11.5px;color:var(--dim);line-height:1.8}
.bullet{color:var(--gold-dim);margin-left:4px}
.schedule-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.schedule-item:last-child{border:none}
.sch-time{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--gold);width:64px;flex-shrink:0;padding-top:2px}
.sch-act{font-size:12.5px;font-weight:600;margin-bottom:2px}
.sch-note{font-size:10.5px;color:var(--dim)}
.rule{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:10px}
.rule-num{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--gold-dim);margin-bottom:5px;letter-spacing:2px}
.rule-title{font-size:13.5px;font-weight:700;margin-bottom:5px}
.rule-body{font-size:11.5px;color:var(--dim);line-height:1.7}

.more-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;margin-bottom:10px;cursor:pointer}
.more-icon{width:38px;height:38px;border-radius:10px;background:var(--gold-glow);color:var(--gold);display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.more-txt{flex:1}
.more-name{font-size:13.5px;font-weight:700}
.more-sub{font-size:11px;color:var(--dim);margin-top:1px}
.more-arrow{color:var(--faint)}

.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border:none}
.settings-row .lbl{font-size:13.5px}
.settings-row .sub{font-size:10.5px;color:var(--dim);margin-top:2px}
.switch{width:44px;height:25px;border-radius:99px;background:var(--raised);position:relative;cursor:pointer;border:1px solid var(--border)}
.switch.on{background:var(--gold);border-color:var(--gold)}
.switch .knob{position:absolute;top:2px;right:2px;width:19px;height:19px;border-radius:50%;background:var(--void);transition:.2s}
.switch.on .knob{right:21px;background:var(--void)}
.theme-opts{display:flex;gap:8px}
.theme-opt{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px;text-align:center;font-size:11.5px;cursor:pointer;background:var(--raised)}
.theme-opt.sel{border-color:var(--gold);color:var(--gold);font-weight:700}
input[type=date],input[type=time]{background:var(--raised);border:1px solid var(--border);color:var(--text);border-radius:10px;
  padding:9px 12px;font-family:'Cairo',sans-serif;font-size:13px;width:100%;margin-top:8px;}

.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:26px;height:26px;border-radius:8px;border:1px solid var(--border);background:var(--raised);color:var(--text);
  font-size:16px;cursor:pointer;line-height:1}
.stepper input{width:38px;text-align:center;border:none;background:transparent;color:var(--text);font-size:13px;  font-family:'Space Mono',monospace;}
.dw-slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;background:var(--raised);outline:none;cursor:pointer;margin:2px 0}
.dw-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--gold);border:2px solid var(--void);box-shadow:0 0 0 1px var(--gold-dim);cursor:pointer}
.dw-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--gold);border:2px solid var(--void);
  box-shadow:0 0 0 1px var(--gold-dim);cursor:pointer}
.dw-slider-ticks{display:flex;justify-content:space-between;font-size:8.5px;color:var(--faint);font-family:'Space Mono',monospace;
  margin-top:3px;padding:0 1px}
.dw-slider-ticks span:nth-child(2n){opacity:.5}
.dw-slider-maxed{box-shadow:0 0 8px 0 var(--gold-dim)}
.act-row{display:flex;align-items:center;gap:10px;padding:9px 2px}
.rating-row{display:flex;align-items:center;gap:10px;padding:9px 2px}
.rating-name{width:84px;font-size:12px;color:var(--dim);flex-shrink:0;display:flex;align-items:center;gap:6px}
.rating-dots{display:flex;gap:6px;flex:1}
.rating-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:var(--raised);cursor:pointer;transition:all .15s}
.rating-dot.filled{background:var(--gold);border-color:var(--gold)}
.rating-dot:active{transform:scale(.85)}
.hour-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.hour-row:last-child{border-bottom:none}
.hour-badge{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--gold);flex-shrink:0}
.hour-badge-wrap{display:flex;align-items:center;gap:4px;width:80px;flex-shrink:0;direction:ltr}
.hour-time{background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--gold);
  font-family:'Space Mono',monospace;font-size:10.5px;padding:0;cursor:text;width:38px;text-align:center;flex-shrink:0}
.hour-time:focus{border-bottom-color:var(--gold-dim);outline:none}
.hour-ampm{background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--gold-dim);
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:0 0 1px;cursor:pointer;letter-spacing:.5px;flex-shrink:0}
.hour-row.now .hour-badge, .hour-row.now .hour-time, .hour-row.now .hour-ampm{color:var(--gold);font-weight:700}
.hour-row.now{background:var(--gold-glow);border-radius:8px;padding-inline:6px;margin-inline:-6px}
.hour-input{flex:1;background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);
  font-family:'Cairo',sans-serif;font-size:12px;padding:4px 2px;outline:none;}
.hour-input:focus{border-bottom-color:var(--gold-dim)}
.hour-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s}
.hour-check.done{background:var(--gold);border-color:var(--gold);color:var(--void)}
.hour-remove{background:transparent;border:none;color:var(--faint);font-size:11px;cursor:pointer;flex-shrink:0;padding:2px 4px}
.hour-remove:hover{color:var(--coral)}
.hour-add-row{padding-top:10px;margin-top:2px}
.hour-add-row select{width:100%;background:var(--raised);border:1.5px dashed var(--border);border-radius:10px;color:var(--gold);
  font-family:'Cairo',sans-serif;font-size:12px;padding:9px;cursor:pointer;text-align:center;-webkit-appearance:none;appearance:none}
.act-icon{width:30px;height:30px;border-radius:9px;background:var(--gold-glow);color:var(--gold);display:flex;align-items:center;
  justify-content:center;font-size:15px;flex-shrink:0}
.act-name{width:58px;font-size:12.5px;flex-shrink:0}

.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.date-nav button{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--raised);color:var(--text);
  cursor:pointer;font-size:16px;}
.date-label{text-align:center;flex:1}
.date-label .d1{font-size:14px;font-weight:700}
.date-label .d2{font-size:10.5px;color:var(--dim)}

.empty{padding:32px 8px;text-align:center;color:var(--dim);font-size:12.5px;line-height:1.8}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.7}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--deep);border:1px solid var(--border);border-bottom:none;border-radius:22px 22px 0 0;padding:22px;
  padding-bottom:calc(var(--safe-bottom) + 22px);width:100%;max-width:480px;max-height:82vh;overflow-y:auto;
  box-shadow:0 -12px 40px rgba(0,0,0,.35);position:relative;}
.modal::before{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:.6;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{padding:8px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--raised);font-size:12px;cursor:pointer;color:var(--dim)}
.chip.sel{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);font-weight:700}
.emoji-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.emoji-opt{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:17px;cursor:pointer;background:var(--raised)}
.emoji-opt.sel{border-color:var(--gold);background:var(--gold-glow)}

.toast{position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:50%;transform:translateX(-50%) translateY(40px);
  background:var(--raised);border:1px solid var(--gold-dim);color:var(--gold);padding:10px 20px;border-radius:100px;font-size:12.5px;
  opacity:0;transition:all .3s;white-space:nowrap;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;height:100vh;color:var(--dim);
  font-size:12.5px;font-family:'Cairo',sans-serif;letter-spacing:1px;}
.loading-mark{width:14px;height:14px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 20px var(--gold-strong);animation:loadingPulse 1.1s ease-in-out infinite;}
@keyframes loadingPulse{0%,100%{transform:scale(.7);opacity:.5}50%{transform:scale(1.15);opacity:1}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scroll{animation:fadeSlideIn .32s cubic-bezier(.22,.61,.36,1)}
@keyframes overlayFade{from{opacity:0}to{opacity:1}}
@keyframes overlayFadeOut{to{opacity:0}}
@keyframes modalUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes modalDown{to{transform:translateY(40px);opacity:0}}
.modal-overlay{animation:overlayFade .2s ease}
.modal{animation:modalUp .28s cubic-bezier(.22,.61,.36,1)}
@keyframes pop{0%{transform:scale(.55)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
.habit.done .habit-check{animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
.habit,.more-item,.trade-card,.pillar-card,.phase,.rule,.stat-box{transition:transform .15s ease,background .2s ease,border-color .2s ease}
.habit:active,.more-item:active,.trade-card:active{transform:scale(.98)}
.nav-item{transition:color .2s ease}
.nav-item .nav-icon{transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.nav-item.active .nav-icon{transform:translateY(-2px)}
.chip,.theme-opt,.emoji-opt,.result-btn{transition:all .18s ease}
.stat-num{transition:color .2s ease}
.gold-price-card{position:relative;overflow:hidden}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skel{background:linear-gradient(90deg,var(--raised) 25%,var(--border) 50%,var(--raised) 75%);background-size:200px 100%;animation:shimmer 1.4s infinite;border-radius:6px}
::-webkit-scrollbar{width:0;height:0}
.report-page{background:#fbfaf7;color:#20201c;border-radius:14px;padding:22px 18px;font-family:'Cairo',sans-serif;
  box-shadow:0 2px 18px rgba(0,0,0,.25);}
.report-header{display:flex;align-items:center;gap:14px;padding-bottom:16px;margin-bottom:16px;border-bottom:2px solid #c9a84c}
.report-logo{width:46px;height:46px;flex-shrink:0;border-radius:12px;background:#0a0a0f;color:#c9a84c;font-family:'Space Mono',monospace;
  font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;letter-spacing:-1px}
.report-title{font-size:16px;font-weight:900;color:#171712}
.report-sub{font-size:11.5px;color:#6b6b60}
.report-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.report-stat{background:#f1efe6;border-radius:10px;padding:10px 4px;text-align:center}
.report-stat-num{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:#a3811f}
.report-stat-label{font-size:9.5px;color:#6b6b60;margin-top:2px}
.report-section-title{font-size:12.5px;font-weight:900;color:#171712;margin:16px 0 8px;padding-top:12px;border-top:1px solid #e5e2d6}
.report-page .report-section-title:first-of-type{border-top:none;padding-top:0}
.report-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.report-bar-label{font-size:11px;color:#3a3a32;width:110px;flex-shrink:0}
.report-bar-track{flex:1;height:8px;background:#e5e2d6;border-radius:6px;overflow:hidden}
.report-bar-fill{height:100%;background:linear-gradient(90deg,#a3811f,#c9a84c);border-radius:6px}
.report-bar-pct{font-family:'Space Mono',monospace;font-size:10.5px;color:#6b6b60;width:32px;text-align:left;flex-shrink:0}
.report-empty{font-size:11.5px;color:#8a8a7a}
.report-two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.report-list{margin:0;padding-inline-start:18px;font-size:11.5px;color:#3a3a32;line-height:1.9}
.report-badges{display:flex;flex-wrap:wrap;gap:6px}
.report-badge{background:#f1efe6;border:1px solid #d8d4c2;border-radius:20px;padding:4px 10px;font-size:10.5px;color:#3a3a32}
.report-footer{margin-top:20px;padding-top:12px;border-top:1px solid #e5e2d6;font-size:10px;color:#9a9a8a;text-align:center}
@media print{
  body *{visibility:hidden}
  .report-page, .report-page *{visibility:visible}
  .report-page{position:absolute;inset:0;width:100%;box-shadow:none;border-radius:0;padding:16px}
  .no-print{display:none !important}
  @page{margin:14mm}
}

/* ===================== ENGLISH JOURNEY (PRO) ===================== */
.eng-hero{position:relative;background:linear-gradient(155deg,rgba(77,232,255,.10),rgba(168,85,247,.06) 55%,transparent);
  border:1px solid var(--gold-dim);border-radius:20px;padding:22px 18px;margin-bottom:16px;overflow:hidden}
.eng-hero::before{content:'';position:absolute;top:-40%;left:-20%;width:70%;height:180%;
  background:radial-gradient(circle,var(--gold-glow),transparent 70%);pointer-events:none}
.eng-hero-top{display:flex;align-items:center;gap:16px;position:relative}
.eng-ring{flex-shrink:0;position:relative;width:78px;height:78px}
.eng-ring svg{transform:rotate(-90deg)}
.eng-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--gold)}
.eng-hero-title{font-size:16.5px;font-weight:900;margin-bottom:4px;letter-spacing:-.2px}
.eng-hero-sub{font-size:11.5px;color:var(--dim);line-height:1.7}
.eng-hero-meta{display:flex;gap:8px;margin-top:12px;position:relative;flex-wrap:wrap}
.eng-chip{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3px;padding:4px 10px;border-radius:100px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim)}
.eng-chip.on{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold)}

.eng-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.eng-stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.eng-stat-num{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--text)}
.eng-stat-num.gold{color:var(--gold)}
.eng-stat-label{font-size:9.5px;color:var(--dim);margin-top:3px;line-height:1.4}

.eng-counter{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px}
.eng-counter-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--raised);
  color:var(--text);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .15s ease,background .2s ease}
.eng-counter-btn:active{transform:scale(.92)}
.eng-counter-btn.plus{border-color:var(--gold-dim);color:var(--gold)}
.eng-counter-mid{flex:1;text-align:center}
.eng-counter-num{font-family:'Space Mono',monospace;font-size:22px;font-weight:900;color:var(--gold)}
.eng-counter-label{font-size:9.5px;color:var(--dim);margin-top:2px}

.eng-timeline{position:relative;padding-inline-start:22px;margin-top:4px}
.eng-timeline::before{content:'';position:absolute;top:6px;bottom:6px;right:8px;width:2px;
  background:linear-gradient(180deg,var(--gold-dim),var(--border));border-radius:2px}
.eng-week{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:14px 15px;margin-bottom:10px;cursor:pointer;transition:transform .15s ease,border-color .2s ease}
.eng-week:active{transform:scale(.985)}
.eng-week::after{content:'';position:absolute;top:18px;right:-22px;width:11px;height:11px;border-radius:50%;
  background:var(--faint);border:2px solid var(--void)}
.eng-week.current{border-color:var(--gold-dim);background:var(--gold-glow);box-shadow:0 6px 20px -14px var(--gold-strong)}
.eng-week.current::after{background:var(--gold);box-shadow:0 0 0 4px var(--gold-glow)}
.eng-week.done::after{background:var(--mint)}
.eng-week.done{opacity:.72}
.eng-week.upcoming{opacity:.55}
.eng-week-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.eng-week-num{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.5px;color:var(--dim)}
.eng-week-status{font-size:10px;font-weight:700}
.eng-week-status.current{color:var(--gold)}
.eng-week-status.done{color:var(--mint)}
.eng-week-title{font-size:13.5px;font-weight:700;margin-bottom:5px;line-height:1.4}
.eng-week-focus{font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:8px}
.eng-skill-row{display:flex;flex-wrap:wrap;gap:5px}
.eng-skill{font-size:9.5px;padding:3px 8px;border-radius:100px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);color:var(--dim);font-family:'Cairo',sans-serif}
.eng-week.current .eng-skill{border-color:var(--gold-dim);color:var(--gold-light)}

const LS_PREFIX = 'yasminyk_';
// Safe storage: try localStorage, but never let it crash the app in sandboxed/preview contexts.
// Falls back to an in-memory store (data won't persist across reloads there, but the app still works).
const _memStore = {};
let _lsAvailable = true;
try{
  const t = '__ls_test__';
  localStorage.setItem(t,'1'); localStorage.removeItem(t);
}catch(e){ _lsAvailable = false; }
const storage = {
  async get(key){
    if(_lsAvailable){
      try{
        const v = localStorage.getItem(LS_PREFIX+key);
        if(v===null) throw new Error('not found');
        return {key, value:v};
      }catch(e){ /* fall through to memory */ }
    }
    if(!(key in _memStore)) throw new Error('not found');
    return {key, value:_memStore[key]};
  },
  async set(key, value){
    if(_lsAvailable){
      try{ localStorage.setItem(LS_PREFIX+key, value); return {key, value}; }
      catch(e){ /* fall through to memory */ }
    }
    _memStore[key] = value;
    return {key, value};
  },
  async delete(key){
    if(_lsAvailable){
      try{ localStorage.removeItem(LS_PREFIX+key); return {key, deleted:true}; }
      catch(e){ /* fall through to memory */ }
    }
    delete _memStore[key];
    return {key, deleted:true};
  },
  async list(prefix){
    const keys = [];
    if(_lsAvailable){
      try{
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(k && k.startsWith(LS_PREFIX)){
            const bare = k.slice(LS_PREFIX.length);
            if(!prefix || bare.startsWith(prefix)) keys.push(bare);
          }
        }
        return {keys};
      }catch(e){ /* fall through to memory */ }
    }
    Object.keys(_memStore).forEach(bare=>{
      if(!prefix || bare.startsWith(prefix)) keys.push(bare);
    });
    return {keys};
  }
};

function guessTimeGroup(h){
  const txt = ((h.name||'')+' '+(h.identity||'')).toLowerCase();
  if(/قرآن|صلاة|فجر|دعاء|ذكر|لله|إيمان/.test(txt)) return 'religious';
  if(h.time){
    const hour = parseInt(h.time.split(':')[0]);
    if(!isNaN(hour)){
      if(hour>=4 && hour<11) return 'morning';
      if(hour>=11 && hour<17) return 'midday';
      return 'evening';
    }
  }
  return 'midday';
}

async function loadSettings(){
  try{
    const r = await storage.get('settings'); settings = JSON.parse(r.value);
    // Migration: أضيفي أي عادة افتراضية جديدة (بحسب id) لسه مش موجودة عند المستخدم، من غير ما تمسي أي حاجة تانية
    if(!Array.isArray(settings.habits)) settings.habits = [];
    const existingIds = new Set(settings.habits.map(h=>h.id));
    let migrated = false;
    DEFAULT_HABITS.forEach(dh=>{
      if(!existingIds.has(dh.id)){ settings.habits.push({...dh}); migrated = true; }
    });
    // Migration: إصلاح أيقونة عادة "Brush Teeth" لو كانت فاضية أو بالإيموجي القديم اللي مش بيظهر في بعض الأجهزة
    settings.habits.forEach(h=>{
      if(h.id==='h14' && h.icon!=='🦷'){ h.icon='🦷'; migrated = true; }
    });
    // Migration: امسحي عادة "فجر + قرآن" القديمة لأنها اتستبدلت بعادات "Fajr Prayer" والسور المنفصلة
    const REMOVED_HABIT_IDS = ['h2'];
    const hadRemoved = settings.habits.some(h=>REMOVED_HABIT_IDS.includes(h.id));
    if(hadRemoved){
      settings.habits = settings.habits.filter(h=>!REMOVED_HABIT_IDS.includes(h.id));
      migrated = true;
      try{
        const list = await storage.list('day:');
        const keys = (list&&list.keys)||[];
        for(const k of keys){
          try{
            const dr = await storage.get(k);
            const dayData = JSON.parse(dr.value);
            let changed = false;
            REMOVED_HABIT_IDS.forEach(hid=>{ if(dayData.habits && (hid in dayData.habits)){ delete dayData.habits[hid]; changed = true; } });
            if(changed){ await storage.set(k, JSON.stringify(dayData)); if(dayCache[dayData.date]) dayCache[dayData.date] = dayData; }
          }catch(e){}
        }
      }catch(e){}
    }
    if(migrated) await saveSettings();
  }
  catch(e){
    settings = {
      theme:'dark', startDate: todayStr(), userName:'ياسمين', journeyStarted:false,
      habits: DEFAULT_HABITS.map(h=>({...h})),
      reminders:{enabled:false,time:'20:00'},
      hourSlots:['06','09','12','15','18','21'],
      futureMe:{identity:'',speech:'',thinking:'',relationships:'',health:'',body:'',faith:'',income:'',home:'',dailyLife:'',values:'',personality:''},
      letterFromFuture:'',
      legacyText:'',
      commitment:{why:'',sacrifice:'',consequence:''},
      deepWorkSchedule: defaultDeepWorkSchedule(),
    };
    await saveSettings();
  }
  settings.futureMe = Object.assign({identity:'',speech:'',thinking:'',relationships:'',health:'',body:'',faith:'',income:'',home:'',dailyLife:'',values:'',personality:''}, settings.futureMe||{});
  if(settings.letterFromFuture===undefined) settings.letterFromFuture='';
  if(settings.legacyText===undefined) settings.legacyText='';
  if(!settings.userName) settings.userName = 'ياسمين';
  if(!settings.hourSlots || !settings.hourSlots.length) settings.hourSlots = ['06','09','12','15','18','21'];
  settings.commitment = Object.assign({why:'',sacrifice:'',consequence:''}, settings.commitment||{});
  (settings.habits||[]).forEach(h=>{ if(!h.timeGroup) h.timeGroup = guessTimeGroup(h); });
  if(!settings.exercises) settings.exercises = defaultExercises();
  settings.exercises = settings.exercises.filter(ex=>ex.id!=='ex_quran');
  if(!settings.exercises.some(ex=>ex.id==='ex_water')){
    settings.exercises.unshift({id:'ex_water', name:'شرب مياه', icon:'💧', type:'water', target:3000, unit:'مل'});
  }
  if(!settings.forbidden) settings.forbidden = defaultForbidden();
  if(!settings.tradingConcepts) settings.tradingConcepts = defaultTradingConcepts();
  if(!settings.deepWorkSchedule || !settings.deepWorkSchedule.length) settings.deepWorkSchedule = defaultDeepWorkSchedule();
  settings.deepWorkSchedule.forEach(s=>{ s.label = fixLegacyDWLabel(s.label); });
  if(settings.journeyStarted===undefined) settings.journeyStarted = false;
  applyTheme();
}

function applyTheme(){
  let t = settings.theme;
  if(t==='auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light';

}
function fixLegacyDWLabel(label){
  if(!label) return label;
  const hasArabic = /[\u0600-\u06FF]/.test(label);
  if(!hasArabic) return label;
  const m = String(label).match(/\d+/);
  return m ? `Deep Work ${m[0]}` : 'Deep Work';
}

async function getDay(dateStr){
  if(dayCache[dateStr]) return dayCache[dateStr];
  let parsed = null;
  try{ const r = await storage.get('day:'+dateStr); parsed = JSON.parse(r.value); }catch(e){ parsed = null; }
  const base = Object.assign(defaultDay(), parsed||{}, {date:dateStr});
  if(!base.deepWork || !base.deepWork.blocks || !base.deepWork.blocks.length){
    base.deepWork = { blocks: (settings.deepWorkSchedule||defaultDeepWorkSchedule()).map(s=>({
      id:s.id, label:s.label, category:s.defaultCat, plannedStart:s.plannedStart, plannedMin:s.plannedMin,
      actualMin:0, focusQuality:null, completed:false, note:''
    })) };
  } else {
    base.deepWork.blocks.forEach(b=>{ b.label = fixLegacyDWLabel(b.label); });
  }
  dayCache[dateStr] = base;
  return dayCache[dateStr];
}

/* ===================== SCORE HELPERS ===================== */
function activeHabits(){ return settings.habits.filter(h=>!h.archived); }
function habitWeekOf(dateStr){ return clamp(Math.ceil(clamp(dayIndexFor(dateStr),1,90)/7), 1, 13); }
function isHabitUnlockedFor(h, dateStr){ return !h.unlockWeek || h.unlockWeek<=1 || habitWeekOf(dateStr) >= h.unlockWeek; }
function isHabitOnDay(h, dateStr){ return !h.daysOfWeek || !h.daysOfWeek.length || h.daysOfWeek.includes(parseDate(dateStr).getDay()); }
function activeHabitsForDate(dateStr){ return activeHabits().filter(h=>isHabitUnlockedFor(h, dateStr) && isHabitOnDay(h, dateStr)); }
function catScores(dayRec){
  const dateStr = dayRec.date || todayStr();
  const scores = {};
  Object.keys(CAT).forEach(c=>{
    const hs = activeHabitsForDate(dateStr).filter(h=>h.cat===c);
    if(!hs.length){ scores[c]=null; return; }
    const done = hs.filter(h=>dayRec.habits[h.id]).length;
    scores[c] = Math.round((done/hs.length)*100);
  });
  return scores;
}
function overallScore(scores){
  const vals = Object.values(scores).filter(v=>v!==null);
  if(!vals.length) return 0;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function dayHasActivity(rec){
  const habitsDone = Object.values(rec.habits||{}).some(v=>v);
  const hoursLogged = ACTS.some(a=>(rec.hours[a.key]||0)>0);
  return habitsDone || hoursLogged || (rec.note && rec.note.trim());
}
function scoreToColor(score){
  // 5 مستويات لون متدرج من فاتح لغامق (زي GitHub)، مبني على --gold
  if(score===null) return 'var(--faint)'; // يوم مستقبلي / لم يأتِ بعد
  if(score===0) return 'var(--raised)';
  if(score<25) return 'color-mix(in srgb, var(--gold) 25%, var(--raised))';
  if(score<50) return 'color-mix(in srgb, var(--gold) 45%, var(--raised))';
  if(score<75) return 'color-mix(in srgb, var(--gold) 70%, var(--raised))';
  return 'var(--gold)';
}

function renderConstellation(cellsData){
  const w=320,h=320,cx=160,cy=160,maxR=142;
  const n = cellsData.length;
  const goldenAngle = 137.5077640500378*Math.PI/180;
  const points = cellsData.map((c,i)=>{
    const r = maxR*Math.sqrt((i+0.5)/n);
    const theta = i*goldenAngle;
    return {...c, x:cx+r*Math.cos(theta), y:cy+r*Math.sin(theta)};
  });
  let lastIdx=-1;
  points.forEach((p,i)=>{ if(!p.isFuture) lastIdx=i; });

  let lines='';
  for(let i=1;i<=lastIdx;i++){
    const a=points[i-1], b=points[i];
    const op = 0.12 + (Math.min(a.score||0,b.score||0)/100)*0.38;
    lines += `<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}" style="stroke:url(#constGrad)" stroke-width="1" opacity="${op.toFixed(2)}"/>`;
  }

  const stars = points.map((p,i)=>{
    if(p.isFuture){
      return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="1.4" style="fill:var(--faint)" opacity=".45"/>`;
    }
    const isToday = i===lastIdx;
    const scoreFrac = (p.score||0)/100;
    const radius = (2.2+scoreFrac*3.4).toFixed(1);
    const color = scoreToColor(p.score);
    const glowFilter = isToday ? `filter:drop-shadow(0 0 7px ${p.score>=60?'#a855f7':'#4de8ff'})` : (scoreFrac>0.55?`filter:drop-shadow(0 0 3px rgba(77,232,255,.6))`:'');
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${radius}" style="fill:${color};cursor:pointer;${glowFilter}" class="${isToday?'const-star-today':''}" onclick="openDayFromGrid('${p.dateStr}')"><title>يوم ${p.dayNum} — ${p.score}%</title></circle>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="290" style="overflow:visible">
    <defs><linearGradient id="constGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4de8ff"/><stop offset="50%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ff4fd8"/>
    </linearGradient></defs>
    ${lines}${stars}
  </svg>`;
}
function computeStreaks(recsAsc){
  let current=0;
  for(let i=recsAsc.length-1;i>=0;i--){ if(dayHasActivity(recsAsc[i])) current++; else break; }
  let best=0, run=0;
  recsAsc.forEach(r=>{ if(dayHasActivity(r)){ run++; best=Math.max(best,run); } else run=0; });
  return {current, best};
}

function computeLocalInsight(elapsedRecs){
  if(elapsedRecs.length<5) return 'استمري في تسجيل يومك — كل ما البيانات تزيد كل ما فهمك لنفسك يبقى أعمق 📊';
  const withSleep = elapsedRecs.map(r=>({sleep:r.hours.sleep||0, pct:overallScore(catScores(r))}));
  const highSleep = withSleep.filter(d=>d.sleep>=6), lowSleep = withSleep.filter(d=>d.sleep>0 && d.sleep<6);
  if(highSleep.length>=3 && lowSleep.length>=3){
    const avgHigh = Math.round(highSleep.reduce((a,b)=>a+b.pct,0)/highSleep.length);
    const avgLow = Math.round(lowSleep.reduce((a,b)=>a+b.pct,0)/lowSleep.length);
    if(avgHigh-avgLow>=12) return `لاحظنا إنك أكتر التزامًا بنسبة ${avgHigh-avgLow}% في الأيام اللي بتاخدي فيها نوم كافي 😴`;
  }
  const withMood = elapsedRecs.filter(r=>r.mood).map(r=>({mood:r.mood, pct:overallScore(catScores(r))}));
  if(withMood.length>=5){
    const highMood = withMood.filter(d=>d.mood>=4), lowMood = withMood.filter(d=>d.mood<=2);
    if(highMood.length>=2 && lowMood.length>=2){
      const avgHigh = Math.round(highMood.reduce((a,b)=>a+b.pct,0)/highMood.length);
      const avgLow = Math.round(lowMood.reduce((a,b)=>a+b.pct,0)/lowMood.length);
      if(avgHigh-avgLow>=12) return `مزاجك بيأثر بوضوح على التزامك — الأيام اللي مزاجك فيها عالي إنجازك بيزيد ${avgHigh-avgLow}%`;
    }
  }
  const last7 = elapsedRecs.slice(-7).map(r=>overallScore(catScores(r)));
  const prev7 = elapsedRecs.slice(-14,-7).map(r=>overallScore(catScores(r)));
  if(last7.length>=4 && prev7.length>=4){
    const a1 = Math.round(last7.reduce((a,b)=>a+b,0)/last7.length);
    const a2 = Math.round(prev7.reduce((a,b)=>a+b,0)/prev7.length);
    if(a1-a2>=8) return `التزامك الأسبوع ده أعلى من اللي فات بـ ${a1-a2}% — كده اقتربتي من نسختك اللي حلمتي بيها أكتر 🚀`;
    if(a2-a1>=8) return `التزامك قلّ ${a2-a1}% عن الأسبوع اللي فات — دي علامة تستاهل وقفة صغيرة مع نفسك`;
  }
  return 'بتبني نفسك يوم ورا يوم — كل التزام بسيط النهارده هو خطوة لحياتك اللي بتحلمي بيها ✨';
}
function buildLocalCoachInsights(elapsedDays, elapsedRecs){
  if(elapsedRecs.length<5) return ['استمري في تسجيل يومك — كل ما البيانات تزيد كل ما التحليل يبقى أدق 📊'];
  const insights = [computeLocalInsight(elapsedRecs)];

  const dowSums = Array(7).fill(0), dowCounts = Array(7).fill(0);
  elapsedDays.forEach((d,i)=>{ const dow=parseDate(d).getDay(); dowSums[dow]+=overallScore(catScores(elapsedRecs[i])); dowCounts[dow]++; });
  const dowAvgs = dowSums.map((s,i)=> dowCounts[i]? s/dowCounts[i] : null);
  let bestDow=-1,bestVal=-1, worstDow=-1, worstVal=101;
  dowAvgs.forEach((v,i)=>{ if(v!==null){ if(v>bestVal){bestVal=v;bestDow=i;} if(v<worstVal){worstVal=v;worstDow=i;} } });
  if(bestDow>=0 && dowCounts[bestDow]>=2) insights.push(`أفضل أيامك دايمًا يوم ${WEEKDAYS[bestDow]} — متوسط إنجاز ${Math.round(bestVal)}% 🌟`);
  if(worstDow>=0 && dowCounts[worstDow]>=2 && worstDow!==bestDow) insights.push(`يوم ${WEEKDAYS[worstDow]} هو الأضعف عندك (${Math.round(worstVal)}%) — جهزي له خطة أبسط من العادي`);

  if(activeHabits().length>=2 && elapsedDays.length>=5){
    const habitPcts = activeHabits().map(h=>{
      const unlockedIdxs = elapsedDays.map((d,i)=>isHabitUnlockedFor(h,d)?i:-1).filter(i=>i>=0);
      if(unlockedIdxs.length<5) return null;
      const done = unlockedIdxs.filter(i=>elapsedRecs[i].habits[h.id]).length;
      return {name:h.name, pct: Math.round((done/unlockedIdxs.length)*100)};
    }).filter(Boolean);
    if(habitPcts.length>=2){
      const best = habitPcts.reduce((a,b)=>b.pct>a.pct?b:a);
      const worst = habitPcts.reduce((a,b)=>b.pct<a.pct?b:a);
      if(best.name!==worst.name && best.pct-worst.pct>=15){
        insights.push(`أقوى عادة عندك "${best.name}" (${best.pct}%) — وأكتر عادة بتفوتك "${worst.name}" (${worst.pct}%)، ركزي عليها الأسبوع الجاي`);
      }
    }
  }

  const avgAll = Math.round(elapsedRecs.map(r=>overallScore(catScores(r))).reduce((a,b)=>a+b,0)/elapsedRecs.length);
  insights.push(`بمعدل التزامك الحالي (${avgAll}%)، لو استمريتي بنفس الوتيرة هتخلّصي خطة الـ90 يوم بمستوى إنجاز إجمالي حوالي ${avgAll}% — ${avgAll>=75?'وده ممتاز فعلاً 🚀':avgAll>=50?'وده كويس، بس فيه مجال تزودي فيه':'وده وقت مناسب تراجعي استراتيجيتك مع نفسك'}`);

  return insights;
}

function aggregateSeries(days, recs, granularity, valueFn){
  if(granularity==='day'){
    return days.map((d,i)=>({label: String(dayIndexFor(d)), value: valueFn(recs[i])}));
  }
  if(granularity==='week'){
    const buckets = {};
    days.forEach((d,i)=>{ const wk=Math.floor(i/7); (buckets[wk]=buckets[wk]||[]).push(valueFn(recs[i])); });
    return Object.keys(buckets).sort((a,b)=>a-b).map(wk=>{
      const arr = buckets[wk].filter(v=>v!==null);
      const avg = arr.length? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
      return {label:'أ'+(parseInt(wk)+1), value: avg};
    });
  }
  // month
  const buckets = {};
  days.forEach((d,i)=>{ const key=d.slice(0,7); (buckets[key]=buckets[key]||[]).push(valueFn(recs[i])); });
  return Object.keys(buckets).sort().map(key=>{
    const arr = buckets[key].filter(v=>v!==null);
    const avg = arr.length? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
    const m = parseInt(key.split('-')[1])-1;
    return {label: MONTHS[m].slice(0,3), value: avg};
  });
}

function computeLifeWheel(elapsedRecs){
  const bodyHabits = activeHabits().filter(h=>h.cat==='body');
  const mindHabits = activeHabits().filter(h=>h.cat==='mind');
  const englishHabits = activeHabits().filter(h=>h.cat==='english');
  const tradingHabits = activeHabits().filter(h=>h.cat==='trading');
  const incomeHabits = activeHabits().filter(h=>h.cat==='income');
  const pctFor = hs => {
    if(!hs.length || !elapsedRecs.length) return 0;
    let doneSum=0, totalSum=0;
    hs.forEach(h=>{
      elapsedRecs.forEach(r=>{
        if(!isHabitUnlockedFor(h, r.date)) return;
        totalSum++; if(r.habits[h.id]) doneSum++;
      });
    });
    return totalSum? Math.round((doneSum/totalSum)*100) : 0;
  };
  const avgRating = key => {
    const vals = elapsedRecs.map(r=>r[key]).filter(v=>v);
    return vals.length? (vals.reduce((a,b)=>a+b,0)/vals.length)*20 : null; // 1-5 -> 0-100
  };
  const avgSleepHours = (()=>{
    const vals = elapsedRecs.map(r=>r.hours.sleep||0).filter(v=>v>0);
    return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  })();
  const streaks = computeStreaks(elapsedRecs);
  const learnHours = (()=>{
    const vals = elapsedRecs.map(r=>(r.hours.study||0)+(r.hours.reading||0)+(r.hours.english||0));
    return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  })();
  const conceptsPct = settings.tradingConcepts.length? Math.round((settings.tradingConcepts.filter(c=>c.done).length/settings.tradingConcepts.length)*100) : 0;

  const health = Math.round(((pctFor(bodyHabits)) + Math.min(100,(avgSleepHours/7)*100) + (avgRating('sleepQuality')??50)) / 3);
  const mind = Math.round(((pctFor(mindHabits)) + (avgRating('focus')??50)) / 2);
  const work = Math.round(((avgRating('productivity')??50) + (pctFor(incomeHabits))) / 2);
  const money = Math.round(pctFor(incomeHabits));
  const learning = Math.round(((Math.min(100,(learnHours/1.5)*100)) + (pctFor(englishHabits)) + (pctFor(tradingHabits)) + conceptsPct) / 4);
  const happiness = Math.round(avgRating('mood') ?? 50);
  const confidence = Math.round(Math.min(100,(streaks.current/21)*100));
  const peace = Math.round((avgRating('energy') ?? 50));

  return [
    {label:'الصحة', value:health, auto:true},
    {label:'العقل', value:mind, auto:true},
    {label:'المال', value:money, auto:true},
    {label:'العمل', value:work, auto:true},
    {label:'التعلم', value:learning, auto:true},
    {label:'السعادة', value:happiness, auto:true},
    {label:'السلام النفسي', value:peace, auto:true},
    {label:'الثقة بالنفس', value:confidence, auto:true},
  ];
}
function drawLineChart(points, opts={}){
  const hasData = points.some(p=>p.value!==null && p.value!==undefined);
  if(!hasData) return `<div class="empty">لا توجد بيانات كافية بعد</div>`;
  const color = opts.color || '--gold';
  const w=320,h=118,padL=6,padR=6,padT=10,padB=16;
  const knownVals = points.filter(p=>p.value!==null && p.value!==undefined).map(p=>p.value);
  const lo = opts.min!==undefined && opts.min!==null ? opts.min : Math.min(...knownVals);
  const hi = opts.max!==undefined && opts.max!==null ? opts.max : Math.max(...knownVals);
  const range = (hi-lo)||1;
  const padLo = lo - range*0.08, padHi = hi + range*0.08, padRange=(padHi-padLo)||1;
  const n = points.length;
  const xStep = n>1 ? (w-padL-padR)/(n-1) : 0;
  const scaleY = v => h-padB - ((v-padLo)/padRange)*(h-padT-padB);
  const xOf = i => padL+i*xStep;

  let lastKnownIdx = -1;
  points.forEach((p,i)=>{ if(p.value!==null && p.value!==undefined) lastKnownIdx=i; });
  const knownPts = [];
  for(let i=0;i<=lastKnownIdx;i++){
    if(points[i].value!==null && points[i].value!==undefined) knownPts.push([xOf(i), scaleY(points[i].value)]);
  }
  const linePath = knownPts.length? 'M'+knownPts.map(p=>p.join(',')).join(' L') : '';
  const areaPath = knownPts.length? `M${knownPts[0][0]},${h-padB} L${knownPts.map(p=>p.join(',')).join(' L')} L${knownPts[knownPts.length-1][0]},${h-padB} Z` : '';
  const dots = knownPts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" style="fill:var(${color})"/>`).join('');

  const futureZone = (lastKnownIdx>=0 && lastKnownIdx<n-1)
    ? `<rect x="${xOf(lastKnownIdx)}" y="${padT-4}" width="${w-padR-xOf(lastKnownIdx)}" height="${h-padB-(padT-4)}" style="fill:var(--border);opacity:.25"/>
       <line x1="${xOf(lastKnownIdx)}" y1="${padT-4}" x2="${xOf(lastKnownIdx)}" y2="${h-padB}" style="stroke:var(--gold-dim)" stroke-width="1" stroke-dasharray="3,3"/>
       <text x="${xOf(lastKnownIdx)}" y="${padT-6}" font-size="7.5" style="fill:var(--gold)" text-anchor="middle" font-family="Cairo">النهارده</text>`
    : '';

  const labelEvery = Math.max(1,Math.ceil(n/6));
  const labels = points.map((p,i)=> (i%labelEvery===0 || i===n-1) ? `<text x="${xOf(i)}" y="${h-3}" font-size="8" style="fill:var(--dim)" text-anchor="middle" font-family="Space Mono">${p.label}${opts.suffix||''}</text>` : '').join('');
  const gid = 'lg'+Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="118" preserveAspectRatio="none" style="overflow:visible">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:var(${color});stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:var(${color});stop-opacity:0"/></linearGradient></defs>
    ${futureZone}
    <path d="${areaPath}" style="fill:url(#${gid});stroke:none"/>
    <path d="${linePath}" style="fill:none;stroke:var(${color});stroke-width:2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${labels}
  </svg>`;
}
function drawCandlestickChart(points, opts={}){
  const hasData = points.some(p=>p.value!==null && p.value!==undefined);
  if(!hasData) return `<div class="empty">لا توجد بيانات كافية بعد</div>`;
  const w=320,h=118,padL=6,padR=6,padT=10,padB=16;
  const lo = opts.min!==undefined && opts.min!==null ? opts.min : 0;
  const hi = opts.max!==undefined && opts.max!==null ? opts.max : 100;
  const range=(hi-lo)||1;
  const padLo=lo-range*0.08, padHi=hi+range*0.08, padRange=(padHi-padLo)||1;
  const n = points.length;
  const xStep = n>1 ? (w-padL-padR)/(n-1) : 0;
  const scaleY = v => h-padB - ((v-padLo)/padRange)*(h-padT-padB);
  const xOf = i => padL+i*xStep;
  const candleW = Math.max(2.5, Math.min(13, xStep*0.6));

  let lastKnownIdx=-1;
  points.forEach((p,i)=>{ if(p.value!==null && p.value!==undefined) lastKnownIdx=i; });

  let candles='', prevVal=null;
  points.forEach((p,i)=>{
    if(p.value===null||p.value===undefined) return;
    const cur = p.value;
    const open = prevVal===null ? cur : prevVal;
    const close = cur;
    const bullish = close>=open;
    const color = bullish ? 'var(--mint)' : 'var(--coral)';
    const yOpen=scaleY(open), yClose=scaleY(close);
    const yTop=Math.min(yOpen,yClose), yBody=Math.max(2,Math.abs(yOpen-yClose));
    const x=xOf(i);
    candles += `<line x1="${x}" y1="${yTop-4}" x2="${x}" y2="${yTop+yBody+4}" style="stroke:${color}" stroke-width="1" opacity=".55"/>
      <rect x="${x-candleW/2}" y="${yTop}" width="${candleW}" height="${yBody}" rx="1.2" style="fill:${color}"/>`;
    prevVal = cur;
  });

  const futureZone = (lastKnownIdx>=0 && lastKnownIdx<n-1)
    ? `<rect x="${xOf(lastKnownIdx)+xStep*0.4}" y="${padT-4}" width="${w-padR-(xOf(lastKnownIdx)+xStep*0.4)}" height="${h-padB-(padT-4)}" style="fill:var(--border);opacity:.25"/>
       <text x="${w-padR}" y="${padT-6}" font-size="7.5" style="fill:var(--gold)" text-anchor="end" font-family="Cairo">النهارده</text>`
    : '';
  const labelEvery = Math.max(1,Math.ceil(n/6));
  const labels = points.map((p,i)=> (i%labelEvery===0 || i===n-1) ? `<text x="${xOf(i)}" y="${h-3}" font-size="8" style="fill:var(--dim)" text-anchor="middle" font-family="Space Mono">${p.label}${opts.suffix||''}</text>` : '').join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="118" preserveAspectRatio="none" style="overflow:visible">
    ${futureZone}${candles}${labels}
  </svg>`;
}

async function getHabitNoteHistory(hid){
  const {days, recs} = await getElapsedDaysRecs();
  const entries = [];
  days.forEach((d,i)=>{
    const val = recs[i].habitNotes && recs[i].habitNotes[hid];
    if(val && val.trim()) entries.push({date:d, text:val.trim()});
  });
  return entries.reverse(); // الأحدث الأول
}
function extractLeadingNumber(text){
  const m = text.match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}
function habitNoteNumberStats(entries){
  const nums = entries.map(e=>({date:e.date, n:extractLeadingNumber(e.text)})).filter(e=>e.n!==null);
  if(nums.length < 2) return null;
  const vals = nums.map(e=>e.n);
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const min = Math.min(...vals), max = Math.max(...vals);
  return { count: nums.length, avg: Math.round(avg*10)/10, min, max, latest: nums[0].n };
}
function toggleHabitNoteBox(hid){
  openHabitNoteId = (openHabitNoteId===hid) ? null : hid;

}

function renderHourlyPlanner(rec, dateStr, highlightNow){
  const nowHour = new Date().getHours();
  const activeSlots = [...(settings.hourSlots||[])].sort((a,b)=>parseInt(a,10)-parseInt(b,10));
  const rows = activeSlots.map(hStr=>{
    const slot = rec.hourly[hStr] || {label:'', done:false, minute:'00'};
    const hh24raw = slot.hour || (slot.time ? slot.time.split(':')[0] : hStr);
    const mm = slot.minute || (slot.time ? slot.time.split(':')[1] : '00');
    const hh24 = parseInt(hh24raw,10);
    const hh12 = (hh24%12) || 12;
    const period = hh24<12 ? 'AM' : 'PM';
    const timeVal = `${String(hh12).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
    const isNow = highlightNow && parseInt(hStr,10)===nowHour;
    return `<div class="hour-row ${isNow?'now':''}">
      <div class="hour-badge-wrap">
        <input class="hour-time" type="text" inputmode="numeric" maxlength="5" placeholder="12:00" value="${timeVal}" onchange="setHourlyTime12('${dateStr}','${hStr}',this.value)"/>
        <button type="button" class="hour-ampm" onclick="toggleHourlyAmPm('${dateStr}','${hStr}')">${period}</button>
      </div>
      <input class="hour-input" type="text" placeholder="إيه المخطط للساعة دي؟" value="${escapeHtml(slot.label)}" onchange="setHourlyLabel('${dateStr}','${hStr}',this.value)"/>
      <div class="hour-check ${slot.done?'done':''}" onclick="toggleHourlyDone('${dateStr}','${hStr}')">${slot.done?'✓':''}</div>
      <button type="button" class="hour-remove" onclick="removeHourSlot('${hStr}')" title="شيل الساعة دي">✕</button>
    </div>`;
  }).join('');

  const availableHours = [];
  for(let h=0;h<24;h++){
    const hStr = String(h).padStart(2,'0');
    if(!activeSlots.includes(hStr)) availableHours.push(hStr);
  }
  const addOptionsHtml = availableHours.map(hStr=>{
    const hh24=parseInt(hStr,10), hh12=(hh24%12)||12, period=hh24<12?'AM':'PM';
    return `<option value="${hStr}">${String(hh12).padStart(2,'0')}:00 ${period}</option>`;
  }).join('');
  const addRow = availableHours.length ? `<div class="hour-add-row">
    <select onchange="if(this.value){addHourSlot(this.value); this.value='';}">
      <option value="">+ إضافة ساعة تانية</option>
      ${addOptionsHtml}
    </select>
  </div>` : '';

  return `<div class="card">${rows}${addRow}</div>`;
}
async function addHourSlot(hStr){
  if(!settings.hourSlots.includes(hStr)) settings.hourSlots.push(hStr);
  await saveSettings();

}
async function removeHourSlot(hStr){
  settings.hourSlots = settings.hourSlots.filter(h=>h!==hStr);
  await saveSettings();
  render();
}
function to24Hour(hh12, period){
  let hh = hh12 % 12;
  if(period==='PM') hh += 12;
  return hh;
}
async function setHourlyLabel(dateStr, hour, val){
  const rec = await getDay(dateStr);
  if(!rec.hourly) rec.hourly = {};
  if(!rec.hourly[hour]) rec.hourly[hour] = {label:'', done:false, minute:'00'};
  rec.hourly[hour].label = val;
  await saveDay(dateStr, rec);
  showToast('💾 تم الحفظ');
}
async function setHourlyTime12(dateStr, hour, val){
  const rec = await getDay(dateStr);
  if(!rec.hourly) rec.hourly = {};
  if(!rec.hourly[hour]) rec.hourly[hour] = {label:'', done:false, minute:'00'};
  const slot = rec.hourly[hour];
  const curHH24 = slot.hour!==undefined ? parseInt(slot.hour,10) : parseInt(hour,10);
  const curPeriod = curHH24<12 ? 'AM' : 'PM';
  const digits = String(val).replace(/[^0-9]/g,'');
  let hh12, mm;
  if(digits.length<=2){ hh12 = parseInt(digits,10); mm = 0; }
  else { hh12 = parseInt(digits.slice(0,-2),10); mm = parseInt(digits.slice(-2),10); }
  if(isNaN(hh12) || hh12<1 || hh12>12) hh12 = (curHH24%12)||12;
  if(isNaN(mm)) mm = 0;
  mm = clamp(mm,0,59);
  const hh24 = to24Hour(hh12, curPeriod);
  slot.hour = String(hh24).padStart(2,'0');
  slot.minute = String(mm).padStart(2,'0');
  delete slot.time;
  await saveDay(dateStr, rec);
  render();
}
async function toggleHourlyAmPm(dateStr, hour){
  const rec = await getDay(dateStr);
  if(!rec.hourly) rec.hourly = {};
  if(!rec.hourly[hour]) rec.hourly[hour] = {label:'', done:false, minute:'00', hour};
  const slot = rec.hourly[hour];
  const curHH24 = slot.hour!==undefined ? parseInt(slot.hour,10) : parseInt(hour,10);
  slot.hour = String((curHH24+12)%24).padStart(2,'0');
  delete slot.time;
  await saveDay(dateStr, rec);
  render();
}

function weekStartFor(dateStr, offset){
  const d = parseDate(dateStr);
  const dow = d.getDay(); // 0=Sunday
  const mondayOffset = (dow + 6) % 7; // 0=Monday
  const start = addDays(fmtDate(d), -mondayOffset + offset*7);
  return start;
}
async function renderHabitsWeekGrid(){
  const weekStart = weekStartFor(todayStr(), weekGridOffset);
  const weekDates = Array.from({length:7},(_,i)=>addDays(weekStart,i));
  const active = activeHabits().filter(h=>isHabitUnlockedFor(h, weekDates[6]));
  const upcoming = activeHabits().filter(h=>!isHabitUnlockedFor(h, weekDates[6]));
  if(!active.length) return `<div class="empty"><div class="empty-icon">🌱</div>لا توجد عادات مفعّلة في الأسبوع ده${upcoming.length?'<div style="margin-top:8px;font-size:11px">في '+upcoming.length+' عادة هتتفعّل قريب</div>':''}</div>`;
  const recs = await Promise.all(weekDates.map(getDay));
  const todayS = todayStr();
  const isCurrentWeek = weekGridOffset===0;

  const headerCells = weekDates.map((d,i)=>{
    const isToday = d===todayS;
    return `<div class="wg-head ${isToday?'today':''}">${WEEKDAYS_SHORT[parseDate(d).getDay()]}<br><span class="wg-daynum">${parseDate(d).getDate()}</span></div>`;
  }).join('');

  const bodyRows = active.map(h=>{
    const unlockedDays = weekDates.filter(d=>isHabitUnlockedFor(h,d));
    const doneCount = recs.filter((r,i)=>isHabitUnlockedFor(h,weekDates[i]) && r.habits[h.id]).length;
    const cells = weekDates.map((d,i)=>{
      const locked = !isHabitUnlockedFor(h,d);
      if(locked) return `<div class="wg-cell locked" title="لسه متفعّلتش">🔒</div>`;
      const done = !!recs[i].habits[h.id];
      const future = d > todayS;
      return `<div class="wg-cell ${done?'done':''} ${future?'future':''}" ${future?'':`onclick="toggleHabitForDate('${d}','${h.id}')"`}>${done?'✓':''}</div>`;
    }).join('');
    return `<div class="wg-row">
      <div class="wg-label"><span>${h.icon}</span><span class="wg-name">${escapeHtml(h.name)}</span></div>
      <div class="wg-cells">${cells}</div>
      <div class="wg-count">${doneCount}/${unlockedDays.length}</div>
    </div>`;
  }).join('');

  const rangeLabel = `${humanDateShort(weekDates[0])} – ${humanDateShort(weekDates[6])}`;
  return `
    <div class="wg-nav">
      <button class="icon-x" onclick="shiftWeekGrid(-1)">›</button>
      <div class="wg-range" dir="ltr" style="unicode-bidi:isolate">${rangeLabel}${isCurrentWeek?' <span style="color:var(--gold)">(Current Week)</span>':''}</div>
      <button class="icon-x" onclick="shiftWeekGrid(1)" ${isCurrentWeek?'style="opacity:.3;pointer-events:none"':''}>‹</button>
    </div>
    <div class="card wg-card">
      <div class="wg-row wg-headrow">
        <div class="wg-label"></div>
        <div class="wg-cells">${headerCells}</div>
        <div class="wg-count"></div>
      </div>
      ${bodyRows}
    </div>

/* ===================== DEEP WORK ===================== */
function dwTotalPlannedMin(rec){ return (rec.deepWork.blocks||[]).reduce((s,b)=>s+(b.plannedMin||0),0); }
function dwTotalActualMin(rec){ return (rec.deepWork.blocks||[]).reduce((s,b)=>s+(b.actualMin||0),0); }
function dwCompletedCount(rec){ return (rec.deepWork.blocks||[]).filter(b=>b.completed).length; }
function dwAvgQuality(rec){
  const qs = (rec.deepWork.blocks||[]).map(b=>b.focusQuality).filter(q=>q!=null && q>0);
  if(!qs.length) return null;
  return Math.round((qs.reduce((a,b)=>a+b,0)/qs.length)*10)/10;
}
function dwStreak(elapsedRecs){
  let streak = 0;
  for(let i=elapsedRecs.length-1;i>=0;i--){
    const r = elapsedRecs[i];
    if(r.deepWork && dwCompletedCount(r) >= Math.max(1, (r.deepWork.blocks||[]).length-1)) streak++;
    else break;
  }
  return streak;
}

function dwFormatMin(m){
  m = Number(m)||0;
  const h = Math.floor(m/60), mm = m%60;
  if(h<=0) return `${mm}m`;
  if(mm===0) return `${h}h`;
  return `${h}h${mm}`;
}
async function stepDeepWorkMin(i, delta){

  await saveDay(t, rec); render();
}

async function renderCalendar(){
  document.title;
  const days = [];
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  for(let d=1; d<=daysInMonth; d++) days.push(`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  const recs = await Promise.all(days.map(getDay));
  const today = todayStr();
  const isCurrentMonth = calYear===new Date().getFullYear() && calMonth===new Date().getMonth();

  let grid = WEEKDAYS_SHORT.map(w=>`<div class="cal-day-label">${w}</div>`).join('');
  for(let i=0;i<firstDay;i++) grid += '<div class="cal-cell empty"></div>';
  let doneCount=0, curStreak=0, bestStreak=0, run=0;
  days.forEach((dstr,i)=>{
    const isToday = dstr===today;
    const isFuture = dstr>today;
    const isDone = dayHasActivity(recs[i]);
    if(isDone){ doneCount++; run++; bestStreak=Math.max(bestStreak,run); } else run=0;
    if(!isFuture && isDone) curStreak = run;
    const score = isFuture ? null : overallScore(catScores(recs[i]));
    const bg = isFuture ? 'var(--raised)' : scoreToColor(score);
    const textColor = (!isFuture && score>=50) ? 'var(--void)' : 'var(--text)';
    let cls='cal-cell'+(isToday?' today':'')+((!isFuture && score>0)?' has-score':'');
    grid += `<div class="${cls}" style="background:${bg};color:${textColor}" onclick="goToDate('${dstr}')">${i+1}</div>`;
  });
  const pct = Math.round((doneCount/daysInMonth)*100);
  const msg = pct>=80?'🔥 أداء ممتاز!':pct>=60?'💪 كويس — استمري':pct>=40?'⚡ تحتاجي ضغط أكتر':'🎯 ركزي — الخطة محتاجك';

  return `
    <div class="card cal-swipe" ontouchstart="calTouchStart(event)" ontouchend="calTouchEnd(event)">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-wrap" onclick="jumpToToday()">
          <div class="cal-month">${MONTHS_EN[calMonth]}</div>
          <div class="cal-year">${calYear}${isCurrentMonth?'':' · اليوم ↩'}</div>
        </div>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid">${grid}</div>
      <div class="cal-legend">
        <span class="cal-legend-item"><span class="cal-swatch" style="background:${scoreToColor(0)}"></span>0%</span>
        <span class="cal-legend-item"><span class="cal-swatch" style="background:${scoreToColor(30)}"></span>~30%</span>
        <span class="cal-legend-item"><span class="cal-swatch" style="background:${scoreToColor(60)}"></span>~60%</span>
        <span class="cal-legend-item"><span class="cal-swatch" style="background:${scoreToColor(100)}"></span>100%</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">إحصائيات الشهر</div>
      <div class="card-sub">أيام فيها إنجاز: <strong style="color:var(--gold)">${doneCount}</strong> / ${daysInMonth}<br>
      نسبة الشهر: <strong style="color:var(--mint)">${pct}%</strong> · 🔥 سلسلة: <strong style="color:var(--gold)">${curStreak}</strong> يوم (أطول: ${bestStreak})<br>${msg}</div>
    </div>
  `;
}
function changeMonth(dir){
  calMonth += dir;
  if(calMonth>11){ calMonth=0; calYear++; } if(calMonth<0){ calMonth=11; calYear--; }
  render();
}
function jumpToToday(){
  const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth(); render();
}
let calTouchX=null;
function calTouchStart(e){ calTouchX = e.changedTouches[0].clientX; }
function calTouchEnd(e){
  if(calTouchX===null) return;
  const dx = e.changedTouches[0].clientX - calTouchX;
  if(Math.abs(dx)>50) changeMonth(dx>0 ? -1 : 1); // RTL: swipe right = prev month visually
  calTouchX=null;
}

let reviewPeriod = 'week';
function setReviewPeriod(p){ reviewPeriod = p; render(); }
async function buildReviewData(elapsedDays, elapsedRecs){
  const n = reviewPeriod==='week' ? 7 : 30;
  const curSlice = elapsedRecs.slice(-n);
  const curDays = elapsedDays.slice(-n);
  const prevSlice = elapsedRecs.slice(-2*n, -n);
  const curAvg = curSlice.length? Math.round(curSlice.map(r=>overallScore(catScores(r))).reduce((a,b)=>a+b,0)/curSlice.length):0;
  const prevAvg = prevSlice.length? Math.round(prevSlice.map(r=>overallScore(catScores(r))).reduce((a,b)=>a+b,0)/prevSlice.length):null;
  const delta = prevAvg!==null ? curAvg-prevAvg : null;

  // أفضل وأضعف يوم في الفترة
  let bestDay=null, bestVal=-1, worstDay=null, worstVal=101;
  curDays.forEach((d,i)=>{
    const v = overallScore(catScores(curSlice[i]));
    if(v>bestVal){bestVal=v; bestDay=d;}
    if(v<worstVal){worstVal=v; worstDay=d;}
  });

  // عادات: أقوى وأضعف عادة في الفترة
  const habitPcts = activeHabits().map(h=>{
    const unlockedIdxs = curDays.map((d,i)=>isHabitUnlockedFor(h,d)?i:-1).filter(i=>i>=0);
    if(!unlockedIdxs.length) return null;
    const done = unlockedIdxs.filter(i=>curSlice[i].habits[h.id]).length;
    return {name:h.name, pct: Math.round((done/unlockedIdxs.length)*100)};
  }).filter(Boolean);
  const bestHabit = habitPcts.length? habitPcts.reduce((a,b)=>b.pct>a.pct?b:a) : null;
  const worstHabit = habitPcts.length? habitPcts.reduce((a,b)=>b.pct<a.pct?b:a) : null;

  // عجلة الحياة: مقارنة
  const curWheel = computeLifeWheel(curSlice);
  const prevWheel = prevSlice.length ? computeLifeWheel(prevSlice) : null;
  let bestImprove=null, worstDecline=null;
  if(prevWheel){
    const diffs = curWheel.map((c,i)=>({label:c.label, diff: c.value-prevWheel[i].value}));
    bestImprove = diffs.reduce((a,b)=>b.diff>a.diff?b:a);
    worstDecline = diffs.reduce((a,b)=>b.diff<a.diff?b:a);
  }

  // أهداف الشهر (للمراجعة الشهرية فقط)
  const curMonthKey = monthKeyForOffset(0);
  const monthGoals = goals.filter(g=>g.month===curMonthKey);
  const monthGoalsDone = monthGoals.filter(g=>g.done).length;

  const periodKey = reviewPeriod==='week' ? `review_week_${clamp(Math.ceil(dayIndexFor(todayStr())/7),1,13)}` : `review_month_${curMonthKey}`;
  let savedReflection = '';
  try{ const r = await storage.get(periodKey); savedReflection = JSON.parse(r.value).text || ''; }catch(e){}

  return {curAvg, delta, bestDay, bestVal, worstDay, worstVal, bestHabit, worstHabit, bestImprove, worstDecline, monthGoals, monthGoalsDone, periodKey, savedReflection};
}

function setGranularity(g){ statsGranularity=g; render(); }
async function addGoal(){
  const input = document.getElementById('newGoalInput');
  const text = input.value.trim();
  if(!text){ showToast('اكتبي نص الهدف'); return; }
  goals.push({id:'g'+Date.now(), month: monthKeyForOffset(goalsMonthOffset), text, done:false});
  await saveGoals(); showToast('🎯 تمت إضافة الهدف'); render();
}
async function toggleGoal(id){
  const g = goals.find(x=>x.id===id); if(!g) return;
  g.done = !g.done; await saveGoals(); render();
}
async function deleteGoal(id){
  goals = goals.filter(x=>x.id!==id); await saveGoals(); showToast('تم الحذف'); render();
}

/* ===================== PLAN (static) ===================== */
async function renderPlan(){
  const t = todayStr();
  const idx = clamp(dayIndexFor(t),1,90);
  const {recs: elapsedRecs} = await getElapsedDaysRecs();
  const pStatus = planStatus(elapsedRecs, idx);
  const pct = Math.round((idx/90)*100);

  const phaseDefs = [
    {name:'التأسيس', range:[1,30], icon:'🌱'},
    {name:'الاختبار', range:[31,60], icon:'🔥'},
    {name:'التوسع', range:[61,90], icon:'🚀'},
  ];
  const phaseCards = phaseDefs.map(p=>{
    const active = idx>=p.range[0] && idx<=p.range[1];
    const done = idx>p.range[1];
    return `<div class="pillar-card ${active?'pt-gold':''}" style="${done?'opacity:.55':''}${active?';border:1px solid var(--gold-dim)':''}">
      <div class="pillar-icon">${p.icon}</div><div class="pillar-name">${p.name}</div>
      <div class="pillar-goal">أيام ${p.range[0]}–${p.range[1]}${active?'<br><strong style="color:var(--gold)">المرحلة الحالية</strong>':done?'<br>مكتملة ✓':''}</div>
    </div>`;
  }).join('');

  const totalWeeks = 13;
  const weekPills = Array.from({length:totalWeeks}, (_,i)=>{
    const wIdx = i+1;
    const startDay = i*7+1, endDay = Math.min((i+1)*7, 90);
    const status = idx>endDay ? 'done' : (idx>=startDay && idx<=endDay) ? 'current' : 'upcoming';
    const wStartDate = addDays(settings.startDate, startDay-1);
    const bg = status==='done' ? 'background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold)' :
      status==='current' ? 'background:var(--gold);border-color:var(--gold);color:var(--void);font-weight:700' :
      'background:var(--raised);border-color:var(--border);color:var(--dim)';

      أسبوع ${wIdx}${status==='current'?'<br>👈':''}
    </div>`;
  }).join('');

    <div class="card" style="border-color:var(--gold-dim)">
      <div class="card-title">🗺️ خطة الـ90 يوم</div>
      <div class="progress-bar" style="height:8px;background:var(--raised);border-radius:99px;overflow:hidden;margin-bottom:6px">

      <div class="pillar-row" style="grid-template-columns:repeat(3,1fr)">${phaseCards}</div>
    </div>
    <div class="sec-label">الأسابيع (13 أسبوع)</div>
    <div class="card"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px">${weekPills}</div>
      <div class="card-sub" style="margin-top:10px">دوسي على أي أسبوع للانتقال لسجل أول يوم فيه.</div></div>

    <div class="welcome-banner">
      <div style="font-size:12.5px;color:var(--dim);margin-bottom:4px">الهدف بعد سنة</div>
      <div style="font-size:15px;font-weight:700;line-height:1.6">متحدثة إنجليزي بثقة ✦ فاهمة التداول صح ✦ جسم قوي ✦ عقل صافي ✦ دخل متنوع</div>
    </div>
    <div class="sec-label">الأركان الخمسة</div>
    <div class="pillar-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="pillar-card pt-gold"><div class="pillar-icon">🗣️</div><div class="pillar-name">الإنجليزي</div>
        <div class="pillar-goal">12 أسبوع منهج<br>محادثة بثقة<br>مفردات يومية</div></div>
      <div class="pillar-card pt-violet"><div class="pillar-icon">📊</div><div class="pillar-name">تعلم التداول</div>
        <div class="pillar-goal">مفاهيم من الصفر<br>Backtest منتظم<br>فهم قبل تنفيذ</div></div>
      <div class="pillar-card pt-ice"><div class="pillar-icon">🧠</div><div class="pillar-name">العقل</div>

/* ===================== BACKUP / RESTORE ===================== */
const BACKUP_REMINDER_DAYS = 3;
let lastBackupAtCache = undefined; // undefined = لسه ما اتحملش، null = مفيش
function needsBackupAttention(){
  if(lastBackupAtCache===undefined) return false;
  if(!lastBackupAtCache) return true;
  const daysSince = Math.floor((Date.now()-new Date(lastBackupAtCache).getTime())/DAY_MS);
  return daysSince >= BACKUP_REMINDER_DAYS;
}
async function getLastBackupAt(){
  if(lastBackupAtCache!==undefined) return lastBackupAtCache;
  try{ const r = await storage.get('last_backup_at'); lastBackupAtCache = r.value; }
  catch(e){ lastBackupAtCache = null; }
  return lastBackupAtCache;
}
function backupReminderBannerSync(lastAt){
  if(!lastAt){
    return `<div class="card-sub" style="margin-bottom:10px;color:var(--coral)">⚠️ لسه ما عملتيش نسخة احتياطية أبدًا. بياناتك محفوظة على المتصفح بس — لو اتمسح الكاش أو غيّرتِ الجهاز هتضيع.</div>`;
  }
  const daysSince = Math.floor((Date.now()-new Date(lastAt).getTime())/DAY_MS);
  if(daysSince >= BACKUP_REMINDER_DAYS){
    return `<div class="card-sub" style="margin-bottom:10px;color:var(--coral)">⚠️ آخر نسخة احتياطية من ${daysSince} يوم. يُفضّل تصدير نسخة جديدة كل ${BACKUP_REMINDER_DAYS} أيام.</div>`;
  }
  return `<div class="card-sub" style="margin-bottom:10px;color:var(--mint)">آخر نسخة احتياطية من ${daysSince===0?'النهاردة':daysSince+' يوم'}.</div>`;
}
function backupReminderBanner(){
  // نعرض حالة مبدئية فورية بناءً على الكاش، ونحدّثها لو لسه ما اتحملتش
  if(lastBackupAtCache===undefined){
    getLastBackupAt().then(()=>{ if(subView==='settings') render(); });
    return `<div class="card-sub" style="margin-bottom:10px">جارِ التحقق من آخر نسخة احتياطية...</div>`;
  }
  return backupReminderBannerSync(lastBackupAtCache);
}
async function quickExport(){
  const fab = document.getElementById('fabExportBtn');

  render();
}
async function exportData(){
  const btn = document.getElementById('exportBtn');
  if(btn){ btn.textContent = '⏳ جارِ التجهيز...'; btn.disabled = true; }
  try{
    const backup = { version:1, exportedAt:new Date().toISOString(), settings, goals, fears, dreams, days:{}, images:{} };
    let dayKeys = [];
    try{ const r = await storage.list('day:'); dayKeys = (r.keys||[]); }catch(e){}
    for(const k of dayKeys){
      try{ const r = await storage.get(k); backup.days[k] = JSON.parse(r.value); }catch(e){}
    }
    let imgKeys = [];
    try{ const r1 = await storage.list('dream_img:'); imgKeys = imgKeys.concat(r1.keys||[]); }catch(e){}
    for(const k of imgKeys){
      try{ const r = await storage.get(k); backup.images[k] = r.value; }catch(e){}
    }
    const blob = new Blob([JSON.stringify(backup)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `yasmin-v2-backup-${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    const nowIso = new Date().toISOString();
    try{ await storage.set('last_backup_at', nowIso); lastBackupAtCache = nowIso; }catch(e){}
    showToast('🛰️ البيانات اتأمّنت بنجاح');
  }catch(e){
    showToast('⚠️ حصل خطأ أثناء التصدير');
  }
  if(btn){ btn.textContent = '⬇️ تصدير نسخة احتياطية'; btn.disabled = false; }
}
let pendingImportData = null;
function importDataConfirm(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      pendingImportData = JSON.parse(e.target.result);
    }catch(err){
      showToast('⚠️ الملف مش صالح'); return;
    }
    const bg = document.createElement('div');
    bg.className='modal-overlay open'; bg.id='modalBg';
    bg.innerHTML = `<div class="modal">
      <div class="modal-title">استيراد نسخة احتياطية؟</div>
      <div class="card-sub" style="margin-bottom:16px">هيتم استبدال كل بياناتك الحالية (العادات، السجلات، الترايدات، الأحلام، الأهداف) بمحتوى الملف ده. الإجراء لا يمكن التراجع عنه.</div>
      <div class="btn-row">
        <button class="btn secondary" style="flex:1" onclick="closeModal()">إلغاء</button>
        <button class="btn danger" style="flex:1" onclick="runImportData()">استيراد واستبدال</button>
      </div>
    </div>`;
    document.body.appendChild(bg);
    bg.addEventListener('click',(e2)=>{ if(e2.target===bg) closeModal(); });
  };
  reader.readAsText(file);
  event.target.value = '';
}
async function runImportData(){
  const data = pendingImportData;
  if(!data){ closeModal(); return; }
  closeModal();
  showToast('⏳ جارِ الاستيراد...');
  try{
    if(data.settings) await storage.set('settings', JSON.stringify(data.settings));
    if(data.goals) await storage.set('goals', JSON.stringify(data.goals));
    if(data.fears) await storage.set('fears', JSON.stringify(data.fears));
    if(data.dreams) await storage.set('dreams', JSON.stringify(data.dreams));
    if(data.days) for(const k in data.days) await storage.set(k, JSON.stringify(data.days[k]));
    if(data.images) for(const k in data.images) await storage.set(k, data.images[k]);
    dayCache = {};
    lastBackupAtCache = undefined;
    await loadSettings(); await loadGoals(); await loadFears(); await loadDreams();
    showToast('✅ تم الاستيراد بنجاح');
    render(true);
  }catch(e){
    showToast('⚠️ حصل خطأ أثناء الاستيراد');
  }
  pendingImportData = null;
}

function handleDreamImageSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 720;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      pendingDreamImage = canvas.toDataURL('image/jpeg',0.72);
      const wrap = document.getElementById('dreamImagePreviewWrap');
      if(wrap) wrap.innerHTML = `<div style="position:relative;display:inline-block">
        <img src="${pendingDreamImage}" style="width:100px;height:70px;object-fit:cover;border-radius:10px;border:1px solid var(--border)"/>
        <div onclick="removePendingDreamImage()" style="position:absolute;top:-6px;left:-6px;width:22px;height:22px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer">✕</div>
      </div>`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  pendingDreamImage = null;

function sportExercises(){ return settings.exercises || []; }
function exerciseProgress(rec, ex){
  const v = (rec.sport && rec.sport[ex.id]) || 0;

  return {done, total:exs.length, pct:Math.round((done/exs.length)*100)};

function computeSportStreak(elapsedRecs){
  let streak = 0;
  for(let i=elapsedRecs.length-1;i>=0;i--){
    const r = elapsedRecs[i];
    const stats = sportDayStats(r);
    if(stats.total>0 && stats.pct===100) streak++;
    else break;
  }
  return streak;
}
async function stepExercise(exId, delta){
  const rec = await getDay(todayStr());
  const cur = (rec.sport && rec.sport[exId]) || 0;
  await setExerciseValue(exId, Math.max(0, cur+delta));
}
async function setExerciseValue(exId, rawValue){
  const t = todayStr();
  const rec = await getDay(t);
  const ex = sportExercises().find(e=>e.id===exId);
  if(!ex) return;
  const cur = (rec.sport && rec.sport[exId]) || 0;
  const wasDone = ex.target>0 && cur>=ex.target;
  const next = clamp(parseInt(rawValue)||0, 0, Math.max(ex.target*3, ex.target+50));
  rec.sport = rec.sport || {};
  rec.sport[exId] = next;
  await saveDay(t, rec);
  const nowDone = ex.target>0 && next>=ex.target;
  if(nowDone && !wasDone){
    playPing();
    const stats = sportDayStats(rec);
    if(stats.pct===100) showToast(`🎉💪 خلصتي كل Today's Workout — بطلة! 🏆`);
  }
  render();
}

function sportForbidden(){ return settings.forbidden || []; }
function forbiddenDayStats(rec){
  const list = sportForbidden();
  if(!list.length) return {done:0,total:0,pct:0};
  const done = list.filter(fb=> rec.forbidden && rec.forbidden[fb.id]).length;
  return {done, total:list.length, pct:Math.round((done/list.length)*100)};
}
function computeForbiddenStreak(elapsedRecs){
  let streak = 0;
  for(let i=elapsedRecs.length-1;i>=0;i--){
    const r = elapsedRecs[i];
    const stats = forbiddenDayStats(r);
    if(stats.total>0 && stats.pct===100) streak++;
    else break;
  }
  return streak;
}

      return `<div style="font-weight:700;color:var(--gold);margin:14px 0 6px;font-size:13.5px">${escapeHtml(clean)}</div>`;

    return `<div style="font-size:12.5px;color:var(--dim);line-height:1.8;margin-bottom:2px">${escapeHtml(l)}</div>`;

}
