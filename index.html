async function buildAssistantContext(){
  const t = todayStr();
  const todayRec = await getDay(t);
  const {days: elapsedDays, recs: elapsedRecs} = await getElapsedDaysRecs();
  const idx = clamp(dayIndexFor(t),1,90);
  const streaks = computeStreaks(elapsedRecs);
  const pStatus = planStatus(elapsedRecs, idx);
  const last7Days = elapsedDays.slice(-7), last7Recs = elapsedRecs.slice(-7);
  const last7 = last7Days.map((d,i)=>({date:d, pct:overallScore(catScores(last7Recs[i]))}));
  const habitsToday = activeHabitsForDate(t).map(h=>({name:h.name, cat:CAT[h.cat].label, done: !!todayRec.habits[h.id], note: (todayRec.habitNotes && todayRec.habitNotes[h.id]) || null}));
  const notDone = habitsToday.filter(h=>!h.done).map(h=>h.name);
  const habitNotesToday = habitsToday.filter(h=>h.note && h.note.trim()).map(h=>({name:h.name, note:h.note.trim()}));
  const totalEnglishWords = elapsedRecs.reduce((s,r)=>s+(r.englishWords||0),0);
  const englishWeekNum = clamp(Math.ceil(idx/7), 1, 12);
  const totalEnglishHours = elapsedRecs.reduce((s,r)=>s+(r.hours.english||0),0);

  const dwToday = { planned_min: dwTotalPlannedMin(todayRec), actual_min: dwTotalActualMin(todayRec),
    completed: dwCompletedCount(todayRec), total_blocks: (todayRec.deepWork.blocks||[]).length, avg_quality: dwAvgQuality(todayRec) };
  const dwLast7Avg = last7Recs.length ? Math.round(last7Recs.reduce((s,r)=>s+dwTotalActualMin(r||defaultDay()),0)/last7Recs.length) : 0;

  const sleepTradingLink = buildSleepTradingCorrelation(elapsedRecs);

  return {
    day_index: idx, days_remaining: 90-idx, plan_progress_pct: Math.round((idx/90)*100),
    today_completion_pct: overallScore(catScores(todayRec)),
    today_note: todayRec.note || null,
    today_win: (todayRec.wins||[]).filter(w=>w && w.trim()).join(' · ') || null, today_challenge: todayRec.challengeText || null,
    today_mood: todayRec.mood, today_energy: todayRec.energy, today_sleep_quality: todayRec.sleepQuality,
    today_focus: todayRec.focus, today_productivity: todayRec.productivity,
    habits_not_done_today: notDone,
    habit_notes_today: habitNotesToday,
    current_streak: streaks.current, best_streak: streaks.best,
    last_7_days_completion: last7,
    avg_completion_since_start: pStatus.avg,
    plan_pace_status: pStatus.label,
    english_week_of_12: englishWeekNum, english_total_words: totalEnglishWords, english_total_hours: totalEnglishHours,
    hours_today: todayRec.hours,
    deep_work_today: dwToday, deep_work_last7_avg_min: dwLast7Avg,
    sleep_trading_correlation: sleepTradingLink,
  };
}
function buildSleepTradingCorrelation(elapsedRecs){
  const pairs = elapsedRecs.map(r=>{
    const tradingBlocks = (r.deepWork && r.deepWork.blocks || []).filter(b=>b.category==='trading' && b.focusQuality!=null);
    if(!tradingBlocks.length || r.sleepQuality==null) return null;
    const avgQ = tradingBlocks.reduce((s,b)=>s+b.focusQuality,0)/tradingBlocks.length;
    return { sleep: r.sleepQuality, quality: avgQ };
  }).filter(Boolean);
  if(pairs.length < 5) return { enough_data:false, sample_size: pairs.length };
  const lowSleep = pairs.filter(p=>p.sleep<=2);
  const highSleep = pairs.filter(p=>p.sleep>=4);
  if(!lowSleep.length || !highSleep.length) return { enough_data:false, sample_size: pairs.length };
  const avgLow = lowSleep.reduce((s,p)=>s+p.quality,0)/lowSleep.length;
  const avgHigh = highSleep.reduce((s,p)=>s+p.quality,0)/highSleep.length;
  return { enough_data:true, sample_size: pairs.length, avg_quality_low_sleep: Math.round(avgLow*10)/10, avg_quality_high_sleep: Math.round(avgHigh*10)/10, gap: Math.round((avgHigh-avgLow)*10)/10 };
}
function generateLocalAnalysis(ctx){
  const lines = [];

  lines.push('📋 ملخص اليوم');
  let moodBit = '';
  if(ctx.today_mood!=null){
    if(ctx.today_mood>=4) moodBit = '، ومزاجك كويس النهاردة 🙂';
    else if(ctx.today_mood<=2) moodBit = '، وحسيتي إن مزاجك مش في أحسن حالاته';
  }
  lines.push(`خلصتي ${ctx.today_completion_pct}% من خطة النهاردة${moodBit}.`);
  if(ctx.today_win) lines.push(`أهم إنجاز: ${ctx.today_win}`);
  if(ctx.habit_notes_today && ctx.habit_notes_today.length){
    lines.push('');
    lines.push('📝 ملاحظاتك على العادات النهارده');
    ctx.habit_notes_today.slice(0,5).forEach(h=> lines.push(`- ${h.name}: ${h.note}`));
  }
  lines.push('');

  lines.push('⚠️ لسه ناقص');
  if(!ctx.habits_not_done_today.length){
    lines.push('مفيش حاجة ناقصة النهارده 🎉');
  }else{
    ctx.habits_not_done_today.slice(0,6).forEach(h=> lines.push(`- ${h}`));
  }
  lines.push('');

  lines.push('🎯 أولويات بكرة');
  const priorities = [];
  if(ctx.habits_not_done_today.length){
    priorities.push(`ابدأي بـ"${ctx.habits_not_done_today[0]}" الصبح قبل أي حاجة تانية`);
  }
  const expectedEnglishHours = ctx.day_index * 0.3;
  if(ctx.english_total_hours < expectedEnglishHours){
    priorities.push('خصصي وقت أطول للإنجليزي — معدلك التراكمي أقل من المتوقع لمرحلتك في الخطة');
  }
  if(/متأخر/.test(ctx.plan_pace_status||'')){
    priorities.push('قلّلي عدد المهام اليومية لحاجة تقدري تلتزمي بيها بثبات، وارجعي تزودي بالتدريج');
  }
  if(!priorities.length) priorities.push('كملي بنفس الوتيرة، أداء كويس 👏');
  priorities.slice(0,3).forEach(p=> lines.push(`- ${p}`));
  lines.push('');

  lines.push('📈 تحليل التقدم في خطة الـ90 يوم');
  lines.push(`انتي في اليوم ${ctx.day_index} من 90 (${ctx.plan_progress_pct}%)، ومعدل التزامك العام من بداية الخطة ${ctx.avg_completion_since_start}%.`);
  const paceNote = /متقدمة/.test(ctx.plan_pace_status||'') ? 'استمري كده، معدلك ممتاز فعلاً.'
    : /متأخرة/.test(ctx.plan_pace_status||'') ? 'ده وقت مناسب تراجعي استراتيجيتك مع نفسك من غير لوم.'
    : 'انتي في المسار الصحيح، وفيه مساحة كويسة تتحسني فيها.';
  lines.push(paceNote);
  lines.push('');

  lines.push('🧠 Deep Work النهارده');
  const dw = ctx.deep_work_today;
  const dwHours = Math.round((dw.actual_min/60)*10)/10;
  const dwPlannedHours = Math.round((dw.planned_min/60)*10)/10;
  lines.push(`اشتغلتي ${dwHours} ساعة من أصل ${dwPlannedHours} مخططة (${dw.completed}/${dw.total_blocks} Focus Time خلصت).`);
  if(dw.avg_quality!=null){
    if(dw.avg_quality>=4) lines.push(`جودة تركيزك عالية (${dw.avg_quality}/5) — ده أهم من عدد الساعات نفسه.`);
    else if(dw.avg_quality<=2.5) lines.push(`جودة تركيزك ضعيفة (${dw.avg_quality}/5) — الساعات مش هتفيد لو التركيز مش موجود، راجعي البيئة حواليكي.`);
  }
  const last7AvgH = Math.round((ctx.deep_work_last7_avg_min/60)*10)/10;
  lines.push(`متوسطك آخر 7 أيام: ${last7AvgH} ساعة/يوم.`);
  lines.push('');

  const stc = ctx.sleep_trading_correlation;
  if(stc && stc.enough_data){
    lines.push('🔗 الرابط بين النوم وقرارات التداول');
    if(stc.gap >= 0.5){
      lines.push(`لاحظتي إن جودة تركيزك في Focus Time بتاع التريدنج بتوصل ${stc.avg_quality_high_sleep}/5 لما نومك كويس، مقابل ${stc.avg_quality_low_sleep}/5 لما نومك سيء — فرق حقيقي (${stc.gap} نقطة).`);
      lines.push('النوم مش رفاهية هنا — هو جزء من إدارة المخاطرة بتاعتك كتريدر.');
    }else{
      lines.push(`مفيش فرق واضح لحد دلوقتي بين جودة تركيزك في التريدنج وجودة نومك (بناءً على ${stc.sample_size} يوم مسجل).`);
    }
    lines.push('');
  }

  lines.push('🚨 تنبيه الالتزام');
  const last7 = (ctx.last_7_days_completion||[]).filter(d=>d.pct!=null);
  let warn = false, warnReason = '';
  if(last7.length>=3){
    const avgLast3 = last7.slice(-3).reduce((a,b)=>a+b.pct,0)/3;
    if(avgLast3 < ctx.avg_completion_since_start - 15){ warn = true; warnReason = 'في تراجع ملحوظ في آخر 3 أيام مقارنة بمعدلك العام'; }
  }
  if(ctx.current_streak===0 && ctx.best_streak>=5){ warn = true; warnReason = warnReason || `انقطع الستريك (أفضل ستريك كان ${ctx.best_streak} يوم) — ارجعي ابدأي واحد جديد النهارده`; }
  lines.push(warn ? `${warnReason}، حاولي ترجعي لروتينك بالتدريج من غير ما تحاسبي نفسك بقسوة.` : 'مفيش مؤشرات قلق دلوقتي ✅');

  return lines.join('\n');
}

/* ===================== SHAREABLE REPORT ===================== */
function setReportPeriod(p){ reportPeriod = p; render(); }
async function renderReport(){
  const {days: elapsedDays, recs: elapsedRecs} = await getElapsedDaysRecs();
  const idx = clamp(dayIndexFor(todayStr()),1,90);
  const streaks = computeStreaks(elapsedRecs);
  const pStatus = planStatus(elapsedRecs, idx);

  let periodDays, periodRecs, periodLabel;
  if(reportPeriod==='week'){ periodDays = elapsedDays.slice(-7); periodRecs = elapsedRecs.slice(-7); periodLabel = 'آخر 7 أيام'; }
  else if(reportPeriod==='month'){ periodDays = elapsedDays.slice(-30); periodRecs = elapsedRecs.slice(-30); periodLabel = 'آخر 30 يوم'; }
  else { periodDays = elapsedDays; periodRecs = elapsedRecs; periodLabel = 'من بداية الخطة'; }

  const periodAvg = periodRecs.length ? Math.round(periodRecs.map(r=>overallScore(catScores(r))).reduce((a,b)=>a+b,0)/periodRecs.length) : 0;
  const daysLogged = periodRecs.filter(dayHasActivity).length;

  const catAvg = {};
  Object.keys(CAT).forEach(c=>{
    const hs = activeHabits().filter(h=>h.cat===c);
    if(!hs.length || !periodRecs.length){ catAvg[c]=null; return; }
    let doneSum=0, totalSum=0;
    periodRecs.forEach((r,i)=>{ hs.forEach(h=>{ if(!isHabitUnlockedFor(h,periodDays[i])) return; totalSum++; if(r.habits[h.id]) doneSum++; }); });
    catAvg[c] = totalSum? Math.round((doneSum/totalSum)*100) : null;
  });

  const habitStats = periodRecs.length ? activeHabits().map(h=>{
    const unlockedIdxs = periodDays.map((d,i)=>isHabitUnlockedFor(h,d)?i:-1).filter(i=>i>=0);
    if(!unlockedIdxs.length) return null;
    const done = unlockedIdxs.filter(i=>periodRecs[i].habits[h.id]).length;
    return {name:h.name, icon:h.icon, pct: Math.round((done/unlockedIdxs.length)*100)};
  }).filter(Boolean) : [];
  const topHabits = [...habitStats].sort((a,b)=>b.pct-a.pct).slice(0,3);
  const weakHabits = [...habitStats].sort((a,b)=>a.pct-b.pct).slice(0,3);

  const wins = periodRecs.map((r,i)=>({date:periodDays[i], text:(r.wins||[]).filter(w=>w && w.trim()).join(' · ')})).filter(w=>w.text && w.text.trim()).slice(-5).reverse();

  const dwPeriodPlanned = periodRecs.reduce((s,r)=>s+dwTotalPlannedMin(r),0);
  const dwPeriodActual = periodRecs.reduce((s,r)=>s+dwTotalActualMin(r),0);
  const dwPeriodPct = dwPeriodPlanned>0 ? clamp(Math.round((dwPeriodActual/dwPeriodPlanned)*100),0,150) : 0;

  const habitById = {}; activeHabits().forEach(h=>{ habitById[h.id]=h; });
  const habitNoteEntries = [];
  periodRecs.forEach((r,i)=>{
    if(!r.habitNotes) return;
    Object.keys(r.habitNotes).forEach(hid=>{
      const val = (r.habitNotes[hid]||'').trim();
      if(!val) return;
      const h = habitById[hid];
      habitNoteEntries.push({date:periodDays[i], habitName: h?h.name:'عادة محذوفة', icon: h?h.icon:'📝', text: val});
    });
  });
  const recentHabitNotes = habitNoteEntries.slice(-6).reverse();

  const englishWordsTotal = elapsedRecs.reduce((s,r)=>s+(r.englishWords||0),0);
  const englishHoursTotal = elapsedRecs.reduce((s,r)=>s+(r.hours.english||0),0);
  const achievements = computeAchievements(elapsedRecs, streaks).filter(a=>a.unlocked);

  const catRows = Object.keys(CAT).map(c=>{
    const v = catAvg[c];
    if(v===null) return '';
    return `<div class="report-bar-row">
      <div class="report-bar-label">${CAT[c].icon} ${CAT[c].label}</div>
      <div class="report-bar-track"><div class="report-bar-fill" style="width:${v}%"></div></div>
      <div class="report-bar-pct">${v}%</div>
    </div>`;
  }).join('') || '<div class="report-empty">لسه مفيش عادات مرتبطة بمحاور كفاية</div>';

  const topHabitsHtml = topHabits.length ? topHabits.map(h=>`<li>${h.icon} ${escapeHtml(h.name)} — ${h.pct}%</li>`).join('') : '<li>لسه مفيش بيانات كفاية</li>';
  const weakHabitsHtml = weakHabits.length ? weakHabits.map(h=>`<li>${h.icon} ${escapeHtml(h.name)} — ${h.pct}%</li>`).join('') : '<li>—</li>';
  const winsHtml = wins.length ? wins.map(w=>`<li><strong>${humanDate(w.date)}:</strong> ${escapeHtml(w.text)}</li>`).join('') : '<li>لسه معملتيش تسجيل لأهم إنجاز يومي</li>';
  const habitNotesHtml = recentHabitNotes.length ? recentHabitNotes.map(n=>`<li><strong>${humanDate(n.date)} — ${n.icon} ${escapeHtml(n.habitName)}:</strong> ${escapeHtml(n.text)}</li>`).join('') : '';
  const badgesHtml = achievements.length ? achievements.map(a=>`<span class="report-badge">${a.icon} ${escapeHtml(a.label)}</span>`).join('') : '<span class="report-sub">لسه مفيش أوسمة مفتوحة</span>';

  return `
    <div class="no-print" style="margin-bottom:14px">
      <div class="theme-opts">
        <div class="theme-opt ${reportPeriod==='week'?'sel':''}" onclick="setReportPeriod('week')">آخر أسبوع</div>
        <div class="theme-opt ${reportPeriod==='month'?'sel':''}" onclick="setReportPeriod('month')">آخر شهر</div>
        <div class="theme-opt ${reportPeriod==='all'?'sel':''}" onclick="setReportPeriod('all')">من البداية</div>
      </div>
      <button class="btn block" style="margin-top:12px" onclick="window.print()">🖨️ اطبعي / احفظي PDF</button>
    </div>

    <div class="report-page">
      <div class="report-header">
        <div class="report-logo">YK</div>
        <div>
          <div class="report-title">تقرير ${escapeHtml(settings.userName||'')}</div>
          <div class="report-sub">${periodLabel} · يوم ${idx} من 90 · اتولّد في ${humanDate(todayStr())}</div>
        </div>
      </div>

      <div class="report-stats-grid">
        <div class="report-stat"><div class="report-stat-num">${periodAvg}%</div><div class="report-stat-label">معدل الإنجاز</div></div>
        <div class="report-stat"><div class="report-stat-num">${streaks.current}</div><div class="report-stat-label">الستريك الحالي</div></div>
        <div class="report-stat"><div class="report-stat-num">${streaks.best}</div><div class="report-stat-label">أفضل ستريك</div></div>
        <div class="report-stat"><div class="report-stat-num">${daysLogged}/${periodRecs.length}</div><div class="report-stat-label">أيام مسجّلة</div></div>
      </div>

      <div class="report-section-title">التقدّم حسب المحور</div>
      ${catRows}

      <div class="report-two-col">
        <div>
          <div class="report-section-title">أكتر عادات ملتزمة بيها</div>
          <ul class="report-list">${topHabitsHtml}</ul>
        </div>
        <div>
          <div class="report-section-title">محتاجة تركيز أكتر</div>
          <ul class="report-list">${weakHabitsHtml}</ul>
        </div>
      </div>

      <div class="report-section-title">أهم الإنجازات المسجّلة</div>
      <ul class="report-list">${winsHtml}</ul>

      ${habitNotesHtml?`<div class="report-section-title">ملاحظاتك على العادات</div>
      <ul class="report-list">${habitNotesHtml}</ul>`:''}

      <div class="report-section-title">الإنجليزي</div>
      <div class="report-sub" style="margin-bottom:6px">${englishWordsTotal} كلمة إجمالي · ${englishHoursTotal.toFixed(1)} ساعة مذاكرة من بداية الخطة</div>

      <div class="report-section-title">Focus Time</div>
      <div class="report-sub" style="margin-bottom:6px">${dwFormatMin(dwPeriodActual)} فعلي من ${dwFormatMin(dwPeriodPlanned)} مخطط (${dwPeriodPct}%)</div>

      <div class="report-section-title">الأوسمة المفتوحة (${achievements.length}/${ACHIEVEMENTS.length})</div>
      <div class="report-badges">${badgesHtml}</div>

      <div class="report-footer">Rise Protocol — مسار 90 يوم · ${pStatus.label}</div>
    </div>
  `;
}

/* ===================== REMINDER LOOP ===================== */
setInterval(async ()=>{
  if(!settings || !settings.reminders.enabled) return;
  const now = new Date();
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  if(`${hh}:${mm}`===settings.reminders.time){
    const rec = await getDay(todayStr());
    const remaining = activeHabitsForDate(todayStr()).filter(h=>!rec.habits[h.id]).length;
    if(remaining>0 && 'Notification' in window && Notification.permission==='granted'){
      new Notification('Rise Protocol', {body:`يا ${settings.userName}، تبقّى ${remaining} عادة لم تُنجز اليوم`});
    }
  }
}, 30000);

/* ===================== INIT ===================== */
function playPing(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.45);
    setTimeout(()=>ctx.close(), 600);
  }catch(e){}
}
function playChime(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5 — نغمة صغيرة مبهجة
    notes.forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = ctx.currentTime + i*0.09;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.13, start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(start); osc.stop(start+0.55);
    });
    setTimeout(()=>ctx.close(), 900);
  }catch(e){}
}
function celebrate(){
  const colors = ['#4de8ff','#a855f7','#ff4fd8','#3ce8b8','#a8f2ff'];
  const count = 50;
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6+Math.random()*7;
    el.style.width = size+'px';
    el.style.height = (size*0.4+4)+'px';
    el.style.background = colors[i%colors.length];
    el.style.boxShadow = `0 0 6px ${colors[i%colors.length]}`;
    el.style.left = (Math.random()*100)+'vw';
    el.style.animationDuration = (1.4+Math.random()*1.2)+'s';
    el.style.animationDelay = (Math.random()*0.3)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
  const flash = document.createElement('div');
  flash.className = 'celebrate-flash';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(), 1200);
  playChime();
  showToast(`🎆 تم استقبال إشارة كاملة يا ${settings.userName} — يوم مثالي في المهمة!`);
}
(async function init(){
  await loadSettings();
  await loadGoals();
  await loadFears();
  await loadDreams();
  await loadAssistantCache();
  await render();
})();
</script>
